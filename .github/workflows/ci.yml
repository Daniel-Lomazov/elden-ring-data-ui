name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs hourly at :00 each hour. Adjust cron as needed.
    - cron: '0 * * * *'
  # Allow manual runs from the Actions UI
  workflow_dispatch:

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}"
          restore-keys: "${{ runner.os }}-pip-"
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install ruff==0.12.0
      - name: Run ruff
        run: |
          ruff check .
      - name: Run workspace verification
        run: |
          python -m tools.workspace_verify
