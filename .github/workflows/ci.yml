name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs hourly at :00 each hour. Adjust cron as needed.
    - cron: '0 * * * *'
  # Allow manual runs from the Actions UI
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: "${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}"
          restore-keys: "${{ runner.os }}-pip-"
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff==0.12.0
      - name: Run ruff
        run: |
          ruff check .
      - name: Smoke imports (includes streamlit)
        run: |
          python - <<'PY'
          import importlib, sys
          for m in ("data_loader", "ui_components", "streamlit"):
              try:
                  importlib.import_module(m)
              except Exception as e:
                  print(f"import failed: {m}: {e}")
                  sys.exit(1)
          print('smoke imports ok')
          PY
